name: Publish Container
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: dockerhub
      url: https://hub.docker.com/layers/gidoichi/ical-converter/${{ github.ref_name }}/images/sha256-${{ steps.sha256.outputs.digest }}
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: gidoichi
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        id: docker
        with:
          push: true
          tags: gidoichi/ical-converter:${{ github.ref_name }},gidoichi/ical-converter:latest
      - id: sha256
        env:
          digest: ${{ steps.docker.outputs.digest }}
        run: echo "digest=${digest#sha256:}" >> "$GITHUB_OUTPUT"
