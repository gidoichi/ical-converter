name: Release
on:
  push:
    branches: ["main"]
jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      old-tag: ${{ steps.old-tag.outputs.tag }}
      new-tag: ${{ steps.new-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions-ecosystem/action-get-latest-tag@b7c32daec3395a9616f88548363a42652b22d435 # v1
        id: old-tag
      - name: Semantic Release
        uses: cocogitto/cocogitto-action@390bda87a19bf627e03ad075c67a11e9ddbb7547 # v4
        with:
          command: bump
          args: --auto --disable-bump-commit
      - uses: actions-ecosystem/action-get-latest-tag@b7c32daec3395a9616f88548363a42652b22d435 # v1
        id: new-tag

  tag:
    needs: check
    if: ${{ needs.check.outputs.new-tag != needs.check.outputs.old-tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      value: ${{ steps.new-tag.outputs.tag }}
      pushed: ${{ steps.exists.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: thejeff77/action-push-tag@f110b453ffb8c4d18880b7338f75e6725b731d81 # v1.0.0
        with:
          tag: ${{ needs.check.outputs.new-tag }}

  container:
    needs: check
    if: ${{ needs.check.outputs.new-tag != needs.check.outputs.old-tag }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-container.yml
    secrets: inherit
    with:
      tag: ${{ needs.check.outputs.new-tag }}

  docs:
    permissions:
      pages: write
      id-token: write
    uses: ./.github/workflows/publish-docs.yml
